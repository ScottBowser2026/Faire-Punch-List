name: Daily Summary Email

on:
  schedule:
    # 12:00 UTC = 8:00 AM Eastern (EDT, summer). Switch to '0 13 * * *' once EST (winter, UTC-5) is in effect.
    - cron: '0 12 * * *'
    # 20:30 UTC = 4:30 PM Eastern (EDT, summer). Switch to '30 21 * * *' once EST (winter, UTC-5) is in effect.
    - cron: '30 20 * * *'
  workflow_dispatch: {}

jobs:
  send-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Send daily summary email
        env:
          EMAILJS_PRIVATE_KEY: ${{ secrets.EMAILJS_PRIVATE_KEY }}
        run: node scripts/send-daily-summary.js
