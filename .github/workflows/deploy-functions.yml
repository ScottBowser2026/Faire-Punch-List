name: Deploy Cloud Functions

on:
  push:
    branches: [main]
    paths:
      - 'functions/**'
      - '.github/workflows/deploy-functions.yml'
  workflow_dispatch: {}

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account key
        run: echo "$FIREBASE_SERVICE_ACCOUNT" > /tmp/service-account.json
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}

      - name: Install function dependencies
        run: npm install
        working-directory: functions

      - name: Set Twilio secrets
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
          TWILIO_ACCOUNT_SID: ${{ secrets.TWILIO_ACCOUNT_SID }}
          TWILIO_AUTH_TOKEN: ${{ secrets.TWILIO_AUTH_TOKEN }}
          TWILIO_FROM_NUMBER: ${{ secrets.TWILIO_FROM_NUMBER }}
        run: |
          printf '%s' "$TWILIO_ACCOUNT_SID" | firebase functions:secrets:set TWILIO_ACCOUNT_SID --data-file=- --project faire-builder-tracker --force
          printf '%s' "$TWILIO_AUTH_TOKEN" | firebase functions:secrets:set TWILIO_AUTH_TOKEN --data-file=- --project faire-builder-tracker --force
          printf '%s' "${TWILIO_FROM_NUMBER:-PENDING}" | firebase functions:secrets:set TWILIO_FROM_NUMBER --data-file=- --project faire-builder-tracker --force

      - name: Deploy functions
        env:
          GOOGLE_APPLICATION_CREDENTIALS: /tmp/service-account.json
        run: firebase deploy --only functions --project faire-builder-tracker --non-interactive --force
